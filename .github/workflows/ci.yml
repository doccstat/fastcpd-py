name: Python CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  wheel-and-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: '2'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_lock.txt

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y liblapack-dev libopenblas-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_lock.txt
        shell: bash

      - name: Build and install wheel
        run: |
          python -m build --wheel
          python -m pip install dist/fastcpd-*.whl
        shell: bash

      - name: Verify standalone native extension
        run: >-
          python -c "import fastcpd, fastcpd.interface;
          print(fastcpd.__version__, fastcpd.interface.__doc__)"

      - name: Test installed wheel
        run: |
          mkdir -p tmp
          cp -R tests tmp/tests
          cd tmp
          python -m pytest tests -m "not long" -v
        shell: bash

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Python syntax and undefined names
        run: |
          python -m pip install flake8
          flake8 python tests/test_fastcpd.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
